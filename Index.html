<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Warehouse Digital Twin - UI Test</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  
  <style>
    /* Estilo para el HUD de pantalla tradicional (opcional) */
    #hud-escritorio {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ffcc;
      font-family: monospace;
      background: rgba(10, 15, 30, 0.8);
      padding: 15px;
      border-radius: 5px;
      border: 1px solid #00ffcc;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="hud-escritorio">
    <h3>SISTEMA LOGÍSTICO 3D</h3>
    <p>Haz clic en un rack para ver telemetría.</p>
    <p id="info-seleccionado">Ningún elemento seleccionado</p>
  </div>

  <a-scene cursor="rayOrigin: mouse" raycaster="objects: .interactuable">
    
    <a-assets>
      <canvas id="canvas-ui-dinamica" width="512" height="256" style="display:none;"></canvas>
    </a-assets>

    <a-entity id="camera-rig" position="0 5 10">
      <a-camera id="main-camera" look-controls wasd-controls="fly: true; acceleration: 20;"></a-camera>
    </a-entity>

    <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
    <a-entity light="type: directional; intensity: 0.5;" position="5 15 5"></a-entity>

    <a-plane id="suelo" class="interactuable" rotation="-90 0 0" width="50" height="50" color="#1e222b"></a-plane>

    <a-box id="rack-A1" class="interactuable" position="-3 2 -4" width="2" height="4" depth="1.2" color="#3f4d63" 
           material="roughness: 0.8;">
      <a-box position="0 1 0" width="1.8" height="0.8" depth="1.1" color="#ff4444" opacity="0.8"></a-box>
    </a-box>

    <a-box id="rack-B5" class="interactuable" position="3 2 -4" width="2" height="4" depth="1.2" color="#3f4d63"
           material="roughness: 0.8;">
      <a-box position="0 -0.5 0" width="1.8" height="0.8" depth="1.1" color="#ffbb33" opacity="0.8"></a-box>
    </a-box>

    <a-entity id="panel-telemetria-3d" position="0 -10 0" look-at="#main-camera" visible="false">
      <a-plane width="3" height="1.5" src="#canvas-ui-dinamica" material="shader: flat; transparent: true;"></a-plane>
    </a-entity>

  </a-scene>

  <script>
    // Base de datos simulada del Warehouse (Digital Twin Data)
    const datosWarehouse = {
      'rack-A1': { nombre: 'RACK A-1', sku: 'SKU-9021-X', stock: 88, max: 100, clase: 'Pareto A (Alta)', colorClase: '#ff4444' },
      'rack-B5': { nombre: 'RACK B-5', sku: 'SKU-4412-A', stock: 42, max: 100, clase: 'Pareto B (Media)', colorClase: '#ffbb33' }
    };

    const canvas = document.getElementById('canvas-ui-dinamica');
    const ctx = canvas.getContext('2d');
    const panel3D = document.getElementById('panel-telemetria-3d');
    const infoHUD = document.getElementById('info-seleccionado');

    // Función para dibujar los datos logísticos en el Canvas 2D
    function dibujarMatrizUI(data) {
      // Limpiar canvas con fondo oscuro semi-transparente estilo Sci-Fi
      ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Borde exterior neon
      ctx.strokeStyle = data.colorClase;
      ctx.lineWidth = 6;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);

      // Título del Rack
      ctx.font = 'bold 36px monospace';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(data.nombre, 40, 60);

      // Separador
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(40, 80, canvas.width - 80, 2);

      // Datos técnicos del stock
      ctx.font = '24px monospace';
      ctx.fillStyle = '#a0aec0';
      ctx.fillText(`Contenido:  ${data.sku}`, 40, 120);
      ctx.fillText(`Clasif. ABC: ${data.clase}`, 40, 160);
      
      // Barra de progreso de ocupación
      const porcentaje = (data.stock / data.max);
      ctx.fillText(`Ocupación:  ${data.stock}%`, 40, 200);
      
      ctx.fillStyle = '#2d3748';
      ctx.fillRect(40, 215, canvas.width - 80, 15);
      ctx.fillStyle = data.colorClase;
      ctx.fillRect(40, 215, (canvas.width - 80) * porcentaje, 15);

      // Forzar a A-Frame a actualizar la textura en la GPU
      const mesh = panel3D.getObject3D('mesh');
      if (mesh && mesh.material && mesh.material.map) {
        mesh.material.map.needsUpdate = true;
      }
    }

    // Escuchar los clics en la escena usando delegación de eventos
    document.querySelectorAll('.interactuable').forEach(elemento => {
      elemento.addEventListener('click', function(evt) {
        const id = this.getAttribute('id');

        // Si hace clic en el suelo, ocultamos el panel flotante
        if (id === 'suelo') {
          panel3D.setAttribute('visible', false);
          infoHUD.innerText = 'Ningún elemento seleccionado';
          return;
        }

        // Si es un rack válido en nuestra base de datos
        if (datosWarehouse[id]) {
          const infoNode = datosWarehouse[id];

          // 1. Renderizar la nueva info en el Canvas
          dibujarMatrizUI(infoNode);

          // 2. Reposicionar el panel flotante justo ARRIBA del rack seleccionado
          const posicionRack = this.getAttribute('position');
          panel3D.setAttribute('position', {
            x: posicionRack.x,
            y: posicionRack.y + 2.8, // Flota un poco por encima del tope
            z: posicionRack.z
          });

          // 3. Hacerlo visible
          panel3D.setAttribute('visible', true);

          // 4. Actualizar también el HUD de pantalla clásica
          infoHUD.innerHTML = `Viendo: <strong>${infoNode.nombre}</strong><br>Ocupación: ${infoNode.stock}%`;
        }
      });
    });
  </script>
</body>
</html>
