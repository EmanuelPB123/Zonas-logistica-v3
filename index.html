<!DOCTYPE html>
<html>
  <head>
    <title>Post-it AR Pro - Cuadros de Texto</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
      .ui-overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; }
      .btn { padding: 15px 25px; background: #2196F3; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-family: sans-serif; }
      #counter { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.6); color: white; padding: 6px 14px; border-radius: 20px; font-family: sans-serif; font-size: 14px; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="counter">0 / 12 notas</div>

    <div class="ui-overlay">
      <button id="add-btn" class="btn" onclick="app.openNew()">+ Nueva Nota</button>
    </div>

    <script>
      const app = {
        notes: JSON.parse(localStorage.getItem('ar-notes-v7') || '[]'),
        marker: null,
        MAX_NOTES: 12,

        init: function() {
          this.marker = document.querySelector('#ancla');
          this.marker.addEventListener('markerFound', () => this.render());
          this.updateCounter();
        },

        updateCounter: function() {
          document.getElementById('counter').textContent = `${this.notes.length} / ${this.MAX_NOTES} notas`;
        },

        openNew: function() {
          if (this.notes.length >= this.MAX_NOTES) return;
          const text = prompt("Texto de la nota:");
          if (!text) return;

          // Se posicionan de forma simple acumulando un desfase en X
          const offset = this.notes.length * 1.5 - 2; 
          this.notes.push({ 
            id: 'note-' + Date.now(), 
            text: text, 
            pos: { x: offset, y: 0.25, z: 0 } 
          });
          this.save();
        },

        save: function() {
          localStorage.setItem('ar-notes-v7', JSON.stringify(this.notes));
          this.updateCounter();
          this.render();
        },

        render: function() {
          const oldNotes = this.marker.querySelectorAll('.nota-virtual');
          oldNotes.forEach(n => n.parentNode.removeChild(n));

          this.notes.forEach(data => {
            const container = document.createElement('a-entity');
            container.setAttribute('class', 'nota-virtual');
            container.setAttribute('position', data.pos);
            container.setAttribute('look-at', '[camera]');

            // Fondo del cuadro de texto
            const bg = document.createElement('a-plane');
            bg.setAttribute('width', '1.4');
            bg.setAttribute('height', '1.0');
            bg.setAttribute('color', '#FFEB3B');
            bg.setAttribute('material', 'shader: flat; side: double');

            // El cuadro de texto en sí
            const txt = document.createElement('a-text');
            txt.setAttribute('value', data.text);
            txt.setAttribute('align', 'center');
            txt.setAttribute('baseline', 'center');
            txt.setAttribute('color', '#000');
            txt.setAttribute('width', '3.5');
            txt.setAttribute('wrap-count', '18');
            txt.setAttribute('position', '0 0 0.01');

            container.appendChild(bg);
            container.appendChild(txt);
            this.marker.appendChild(container);
          });
        }
      };
      window.onload = () => app.init();
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
      <a-marker preset="hiro" id="ancla">
          <a-sphere radius="0.05" color="red"></a-sphere>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
